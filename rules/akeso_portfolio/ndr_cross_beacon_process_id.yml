title: NDR + EDR - Network Beacon Followed by Process Identification
id: c1a2b3c4-d5e6-4f78-9a0b-2c3d4e5f6a02
status: experimental
description: |
  NDR detects C2 beaconing to an external IP followed by EDR process creation
  events on the beaconing host within 5 minutes. Correlated by host.name to
  identify the responsible process for the beacon traffic.
references:
  - https://github.com/justaguywhocodes/AkesoSIEM
author: AkesoSIEM
date: 2026/03/15
tags:
  - attack.command_and_control
  - attack.t1071           # Application Layer Protocol
  - attack.execution
  - attack.t1059           # Command and Scripting Interpreter
  - sentinel.cross_portfolio
  - sentinel.ndr_edr
level: high
falsepositives:
  - Legitimate update services with periodic check-in patterns
  - Monitoring agents with fixed-interval heartbeats

# --- Component rules ---

# Rule 1: NDR C2 beacon detection
---
title: NDR C2 Beacon Detection
id: c1a2b3c4-d5e6-4f78-9a0b-200000000001
status: experimental
logsource:
  product: akeso_ndr
detection:
  selection:
    event.kind: alert
    ndr.detection.category: command_and_control
  condition: selection

# Rule 2: EDR suspicious process creation on same host
# (Scoped to common LOLBins — not all process starts)
---
title: EDR Suspicious Process on Beacon Host
id: c1a2b3c4-d5e6-4f78-9a0b-200000000002
status: experimental
logsource:
  category: process_creation
detection:
  selection:
    event.category: process
    event.type: start
    process.name:
      - powershell.exe
      - cmd.exe
      - wscript.exe
      - cscript.exe
      - mshta.exe
      - rundll32.exe
      - regsvr32.exe
      - certutil.exe
      - bitsadmin.exe
      - msiexec.exe
  condition: selection

# Correlation: same host within 5 minutes
---
title: NDR Beacon to EDR Process Identification Correlation
id: c1a2b3c4-d5e6-4f78-9a0b-200000000003
type: correlation
status: experimental
rules:
  - c1a2b3c4-d5e6-4f78-9a0b-200000000001
  - c1a2b3c4-d5e6-4f78-9a0b-200000000002
group-by:
  - host.name
timespan: 5m
ordered: true
condition:
  gte: 2
level: high
