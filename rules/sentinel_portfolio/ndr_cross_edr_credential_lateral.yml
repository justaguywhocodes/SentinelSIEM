title: EDR + NDR - Credential Theft Followed by Lateral Movement
id: c1a2b3c4-d5e6-4f78-9a0b-1c2d3e4f5a01
status: experimental
description: |
  EDR detects LSASS access on Host A followed by NDR detecting SMB lateral
  movement from Host A to Host B within 30 minutes. Correlated by source.ip.
  Indicates credential theft leading to lateral movement via SMB.
references:
  - https://github.com/justaguywhocodes/SentinelSIEM
author: SentinelSIEM
date: 2026/03/15
tags:
  - attack.credential_access
  - attack.t1003           # OS Credential Dumping
  - attack.lateral_movement
  - attack.t1021.002       # SMB/Windows Admin Shares
  - sentinel.cross_portfolio
  - sentinel.edr_ndr
level: critical
falsepositives:
  - Legitimate admin tools accessing LSASS followed by routine SMB file shares
  - Security scanning tools that access LSASS for auditing purposes

# --- Component rules ---

# Rule 1: EDR credential theft (LSASS access)
---
title: EDR LSASS Credential Access
id: c1a2b3c4-d5e6-4f78-9a0b-000000000001
status: experimental
logsource:
  product: sentinel_edr
detection:
  selection_action:
    event.action|contains:
      - lsass
      - credential
      - sekurlsa
      - mimikatz
  selection_kind:
    event.kind: alert
  condition: selection_action and selection_kind

# Rule 2: NDR SMB lateral movement
---
title: NDR SMB Lateral Movement
id: c1a2b3c4-d5e6-4f78-9a0b-000000000002
status: experimental
logsource:
  product: sentinel_ndr
detection:
  selection:
    event.action: smb_write
  condition: selection

# Correlation: same source IP within 30 minutes
---
title: EDR Credential Theft to NDR Lateral Movement Correlation
id: c1a2b3c4-d5e6-4f78-9a0b-000000000003
type: correlation
status: experimental
rules:
  - c1a2b3c4-d5e6-4f78-9a0b-000000000001
  - c1a2b3c4-d5e6-4f78-9a0b-000000000002
group-by:
  - source.ip
timespan: 30m
ordered: true
condition:
  gte: 2
level: critical
