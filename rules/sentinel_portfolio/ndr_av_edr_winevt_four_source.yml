title: Four-Source Attack Chain - SMB Transfer to Malware to Process Drop to User Login
id: f6a7b8c9-d0e1-4f2a-3b4c-5d6e7f8a9b01
status: experimental
description: |
  Four-stage cross-product temporal correlation spanning all major product types:
  1. NDR detects SMB file transfer to a target host
  2. AV detects the transferred file as malicious on the same host
  3. EDR detects the process that dropped/executed the malicious file on the same host
  4. Windows Event Log shows the user account that launched the process on the same host

  All four stages must occur in order within 45 minutes, correlated by host.name.
  This represents a complete lateral tool transfer scenario where an attacker moves
  malware via SMB, it gets flagged by AV, EDR captures the execution chain, and
  Windows auditing identifies the responsible user — four independent products
  converging on one incident.
references:
  - https://attack.mitre.org/techniques/T1570/  # Lateral Tool Transfer
  - https://attack.mitre.org/techniques/T1059/  # Command and Scripting Interpreter
  - https://attack.mitre.org/techniques/T1204/  # User Execution
author: SentinelSIEM
date: 2026/03/16
tags:
  - attack.lateral_movement
  - attack.t1570
  - attack.execution
  - attack.t1059
  - sentinel.cross_portfolio
  - sentinel.four_source
level: critical
falsepositives:
  - Extremely unlikely — requires all four products to fire in sequence on the same host

# --- Component rules ---

# Stage 1: NDR detects SMB file transfer to the target host
---
title: NDR SMB File Transfer to Host
id: f6a7b8c9-d0e1-4f2a-3b4c-b00000000001
status: experimental
logsource:
  product: sentinel_ndr
detection:
  selection:
    event.action|contains:
      - smb_write
      - smb_transfer
      - smb_create
  condition: selection

# Stage 2: AV detects the file as malicious on the target host
---
title: AV Malicious File Detection on Host
id: f6a7b8c9-d0e1-4f2a-3b4c-b00000000002
status: experimental
logsource:
  product: sentinel_av
detection:
  selection:
    event.action:
      - scan_result
      - realtime_block
    av.scan.result:
      - malicious
      - suspicious
  condition: selection

# Stage 3: EDR detects the dropped process execution
---
title: EDR Dropped File Execution
id: f6a7b8c9-d0e1-4f2a-3b4c-b00000000003
status: experimental
logsource:
  product: sentinel_edr
detection:
  selection:
    event.action|contains:
      - process_create
      - file_execute
      - binary_load
  condition: selection

# Stage 4: Windows Event shows user who launched the process
---
title: Windows User Process Launch Audit
id: f6a7b8c9-d0e1-4f2a-3b4c-b00000000004
status: experimental
logsource:
  product: windows
  service: security
detection:
  selection:
    event.action|contains:
      - process_created
      - logged_in
      - logon_success
  condition: selection

# Correlation: all four stages on same host within 45 minutes, ordered
---
title: Four-Source Attack Chain Correlation
id: f6a7b8c9-d0e1-4f2a-3b4c-b00000000005
type: correlation
status: experimental
rules:
  - f6a7b8c9-d0e1-4f2a-3b4c-b00000000001
  - f6a7b8c9-d0e1-4f2a-3b4c-b00000000002
  - f6a7b8c9-d0e1-4f2a-3b4c-b00000000003
  - f6a7b8c9-d0e1-4f2a-3b4c-b00000000004
group-by:
  - host.name
timespan: 45m
ordered: true
condition:
  gte: 4
level: critical
