title: EDR + DLP - Credential Theft Followed by Sensitive Data Access
id: b2c3d4e5-f6a7-4b8c-9d0e-1f2a3b4c5d6e
status: experimental
description: |
  Detects a credential theft alert from sentinel_edr followed by a DLP
  policy violation on confidential data by the same user within 30 minutes.
  This pattern indicates a potential compromise → data theft chain where
  stolen credentials are used to access sensitive files.
references:
  - https://github.com/justaguywhocodes/SentinelSIEM
author: SentinelSIEM
date: 2026/03/14
tags:
  - attack.credential_access
  - attack.t1003         # OS Credential Dumping
  - attack.collection
  - attack.t1005         # Data from Local System
  - attack.exfiltration
  - sentinel.cross_portfolio
  - sentinel.edr_dlp
level: critical
falsepositives:
  - Security administrators performing credential audits who also access classified documents
  - Automated backup processes running under service accounts

# --- Component rules ---

# Rule 1: EDR credential theft detection
---
title: EDR Credential Theft Alert
id: b2c3d4e5-f6a7-4b8c-9d0e-000000000001
status: experimental
logsource:
  product: sentinel_edr
detection:
  selection_action:
    event.action|contains:
      - credential
      - lsass
      - mimikatz
      - sekurlsa
  selection_kind:
    event.kind: alert
  condition: selection_action and selection_kind

# Rule 2: DLP confidential data access
---
title: DLP Confidential Data Access
id: b2c3d4e5-f6a7-4b8c-9d0e-000000000002
status: experimental
logsource:
  product: sentinel_dlp
detection:
  selection:
    event.action|contains:
      - violation
      - audit
    dlp.classification:
      - confidential
      - restricted
  condition: selection

# Correlation: same user within 30 minutes
---
title: EDR + DLP Credential Theft Data Access Correlation
id: b2c3d4e5-f6a7-4b8c-9d0e-000000000003
type: correlation
status: experimental
rules:
  - b2c3d4e5-f6a7-4b8c-9d0e-000000000001
  - b2c3d4e5-f6a7-4b8c-9d0e-000000000002
group-by:
  - user.name
timespan: 30m
ordered: true
condition:
  gte: 2
level: critical
