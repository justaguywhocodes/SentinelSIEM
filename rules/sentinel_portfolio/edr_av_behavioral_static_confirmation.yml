title: EDR + AV - Behavioral Detection Confirmed by Static Analysis
id: a1b2c3d4-e5f6-4a7b-8c9d-0e1f2a3b4c5d
status: experimental
description: |
  Correlates sentinel_edr behavioral detections (shellcode injection, suspicious
  process behavior) with Sentinel AV static scan results on the same host.
  When both the EDR rule engine and AV scanner independently flag activity on
  the same host within 5 minutes, confidence is significantly higher than
  either detection alone.
references:
  - https://github.com/justaguywhocodes/SentinelSIEM
author: SentinelSIEM
date: 2026/03/14
tags:
  - attack.execution
  - attack.t1055         # Process Injection
  - attack.defense_evasion
  - attack.t1027         # Obfuscated Files or Information
  - sentinel.cross_portfolio
  - sentinel.edr_av
level: high
falsepositives:
  - Legitimate security tools that trigger both behavioral and static detections
  - Penetration testing frameworks

# --- Component rules ---

# Rule 1: EDR behavioral detection (scanner match, rule engine alert, or AMSI detection)
---
title: EDR Behavioral Detection
id: a1b2c3d4-e5f6-4a7b-8c9d-000000000001
status: experimental
logsource:
  product: sentinel_edr
detection:
  selection:
    event.action|contains:
      - scanner_match
      - rule_engine_alert
      - amsi_detection
    event.kind: alert
  condition: selection

# Rule 2: AV malicious scan result
---
title: AV Malicious Scan Result
id: a1b2c3d4-e5f6-4a7b-8c9d-000000000002
status: experimental
logsource:
  product: sentinel_av
detection:
  selection:
    event.action: scan_result
    av.scan.result: malicious
  condition: selection

# Correlation: both on same host within 5 minutes
---
title: EDR + AV Behavioral Static Confirmation Correlation
id: a1b2c3d4-e5f6-4a7b-8c9d-000000000003
type: correlation
status: experimental
rules:
  - a1b2c3d4-e5f6-4a7b-8c9d-000000000001
  - a1b2c3d4-e5f6-4a7b-8c9d-000000000002
group-by:
  - host.name
timespan: 5m
condition:
  gte: 2
level: high
