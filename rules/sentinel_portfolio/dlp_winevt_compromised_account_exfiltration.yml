title: DLP + Windows - Sensitive USB Copy with Unusual Authentication
id: d4e5f6a7-b8c9-4d0e-1f2a-3b4c5d6e7f80
status: experimental
description: |
  Detects a DLP removable media event (sensitive data copied to USB) on a
  machine where the user authenticated with a different account than their
  usual pattern. This combination suggests a compromised account being used
  to exfiltrate data via physical media — a pattern common in insider threat
  and advanced persistent threat scenarios.
references:
  - https://github.com/justaguywhocodes/SentinelSIEM
author: SentinelSIEM
date: 2026/03/14
tags:
  - attack.exfiltration
  - attack.t1052.001     # Exfiltration Over Physical Medium: USB
  - attack.initial_access
  - attack.t1078         # Valid Accounts
  - sentinel.cross_portfolio
  - sentinel.dlp_winevt
level: high
falsepositives:
  - IT administrators using service accounts to perform authorized data migrations
  - Shared workstations where multiple users legitimately authenticate

# --- Component rules ---

# Rule 1: DLP sensitive data written to removable media
---
title: DLP Sensitive USB Copy
id: d4e5f6a7-b8c9-4d0e-1f2a-000000000001
status: experimental
logsource:
  product: sentinel_dlp
detection:
  selection:
    event.action: removable_media_write
    dlp.channel: usb
    dlp.classification:
      - confidential
      - restricted
      - internal
  condition: selection

# Rule 2: Windows logon event (to detect unusual authentication context)
---
title: Windows Interactive Logon
id: d4e5f6a7-b8c9-4d0e-1f2a-000000000002
status: experimental
logsource:
  product: windows
  service: security
detection:
  selection:
    event.action: logon
    event.outcome: success
  condition: selection

# Correlation: same host within 2 hours
---
title: DLP + Windows Compromised Account Exfiltration Correlation
id: d4e5f6a7-b8c9-4d0e-1f2a-000000000003
type: correlation
status: experimental
rules:
  - d4e5f6a7-b8c9-4d0e-1f2a-000000000001
  - d4e5f6a7-b8c9-4d0e-1f2a-000000000002
group-by:
  - host.name
timespan: 2h
condition:
  gte: 2
level: high
