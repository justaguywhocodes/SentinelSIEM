title: Authentication Failure from Any Source
id: a1b2c3d4-7002-4a1b-9c49-000000000049
status: stable
description: |
  Detects authentication failures across all log sources, providing
  visibility into failed access attempts organization-wide.
references:
  - https://attack.mitre.org/techniques/T1110/
author: SentinelSIEM (SigmaHQ)
date: 2026/03/16
tags:
  - attack.credential_access
  - attack.t1110
level: medium
logsource:
  category: authentication
detection:
  selection:
    event.outcome: failure
  condition: selection
falsepositives:
  - Users mistyping passwords
  - Expired service account credentials
