title: Mimikatz Credential Dumping Tool Execution
id: f018b1a0-1e02-4c2e-8a3d-6c7b8a9f0e1d
status: stable
description: |
  Detects execution of mimikatz.exe, a well-known credential dumping tool
  commonly used by attackers for lateral movement and privilege escalation.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: SentinelSIEM
date: 2026/03/15
tags:
  - attack.credential_access
  - attack.t1003.001
level: critical
logsource:
  category: process_creation
  product: windows
detection:
  selection_name:
    process.name|contains:
      - mimikatz
  selection_cmdline:
    process.command_line|contains:
      - sekurlsa
      - lsadump
      - kerberos::
      - crypto::
  condition: selection_name or selection_cmdline
falsepositives:
  - Legitimate penetration testing
