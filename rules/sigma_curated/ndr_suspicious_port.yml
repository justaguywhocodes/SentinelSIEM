title: Connection to Suspicious Port
id: a1b2c3d4-4005-4a1b-9c30-000000000030
status: stable
description: |
  Detects outbound connections to ports commonly associated with
  reverse shells, backdoors, and hacking tools.
references:
  - https://attack.mitre.org/techniques/T1571/
author: SentinelSIEM (SigmaHQ)
date: 2026/03/16
tags:
  - attack.command_and_control
  - attack.t1571
level: high
logsource:
  category: network_connection
  product: sentinel_ndr
detection:
  selection:
    destination.port:
      - 4444
      - 5555
      - 6666
      - 1337
      - 31337
  condition: selection
falsepositives:
  - Custom applications using non-standard ports
