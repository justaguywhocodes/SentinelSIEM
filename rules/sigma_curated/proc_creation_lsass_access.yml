title: Suspicious LSASS Process Access
id: a1b2c3d4-1011-4a1b-9c11-000000000011
status: stable
description: |
  Detects suspicious access to the LSASS process, which may indicate
  credential dumping attempts.
references:
  - https://attack.mitre.org/techniques/T1003/001/
author: SentinelSIEM (SigmaHQ)
date: 2026/03/16
tags:
  - attack.credential_access
  - attack.t1003.001
level: critical
logsource:
  category: process_creation
  product: sentinel_edr
detection:
  selection:
    process.command_line|contains:
      - lsass
  condition: selection
falsepositives:
  - Security software performing legitimate LSASS inspection
