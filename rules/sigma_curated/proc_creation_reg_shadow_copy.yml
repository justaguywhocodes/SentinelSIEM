title: Registry SAM/SECURITY Hive Dump
id: a1b2c3d4-1009-4a1b-9c09-000000000009
status: stable
description: |
  Detects reg.exe being used to save SAM or SECURITY registry hives,
  a technique for offline credential extraction.
references:
  - https://attack.mitre.org/techniques/T1003/002/
author: SentinelSIEM (SigmaHQ)
date: 2026/03/16
tags:
  - attack.credential_access
  - attack.t1003.002
level: critical
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process.command_line|contains:
      - reg
      - save
      - sam
      - security
  condition: selection
falsepositives:
  - Legitimate registry backup operations by IT administrators
