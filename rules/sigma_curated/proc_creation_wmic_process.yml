title: WMIC Remote Process Creation
id: a1b2c3d4-1004-4a1b-9c04-000000000004
status: stable
description: |
  Detects WMIC being used to create processes, often leveraged for
  lateral movement and remote code execution.
references:
  - https://attack.mitre.org/techniques/T1047/
author: SentinelSIEM (SigmaHQ)
date: 2026/03/16
tags:
  - attack.execution
  - attack.t1047
level: high
logsource:
  category: process_creation
  product: windows
detection:
  selection:
    process.command_line|contains:
      - wmic
      - process create
  condition: selection
falsepositives:
  - Legitimate system administration via WMIC
