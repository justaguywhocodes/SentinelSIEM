# SentinelSIEM Configuration
# All values shown are defaults. Uncomment and modify as needed.

[elasticsearch]
addresses = ["http://localhost:9200"]
# username = ""
# password = ""
index_prefix = "sentinel"

  [elasticsearch.tls]
  enabled = false
  # ca_cert = "/path/to/ca.crt"
  # insecure_skip_verify = false

[ingest]
http_addr = "0.0.0.0"
http_port = 8080
rate_limit = 10000  # max events per second

  [ingest.syslog]
  tcp_port = 1514
  udp_port = 1514
  tls_port = 6514
  # tls_cert = "/path/to/syslog.crt"
  # tls_key  = "/path/to/syslog.key"

[correlate]
rules_dir = "rules"
reload_interval_sec = 30
state_expiry_sec = 3600

[query]
addr = "0.0.0.0"
port = 8081
cors_origins = ["http://localhost:3000"]

[cases]
retention_days = 365
auto_extract_observables = true

[logging]
level = "info"    # debug, info, warn, error
format = "json"   # json, text
