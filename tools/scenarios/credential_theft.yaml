name: credential_theft
description: "Attacker compromises credentials via mimikatz, accesses sensitive data"
duration_minutes: 60
actors:
  attacker:
    initial_host: WORKSTATION-03
    initial_user: bwilson
  target_host: SERVER-DB-01

timeline:
  # Phase 1: Reconnaissance
  - time_offset_sec: 0
    source_type: sentinel_edr
    template: process_creation
    host: "{{ actors.attacker.initial_host }}"
    fields:
      process_name: cmd.exe
      command_line: "cmd.exe /c whoami /priv"
      parent_process: explorer.exe
      user: "{{ actors.attacker.initial_user }}"
      severity: Low

  - time_offset_sec: 15
    source_type: sentinel_edr
    template: process_creation
    host: "{{ actors.attacker.initial_host }}"
    fields:
      process_name: cmd.exe
      command_line: "cmd.exe /c net user /domain"
      parent_process: explorer.exe
      user: "{{ actors.attacker.initial_user }}"
      severity: Low

  - time_offset_sec: 30
    source_type: sentinel_edr
    template: process_creation
    host: "{{ actors.attacker.initial_host }}"
    fields:
      process_name: cmd.exe
      command_line: "cmd.exe /c net group \"Domain Admins\" /domain"
      parent_process: explorer.exe
      user: "{{ actors.attacker.initial_user }}"
      severity: Medium

  - time_offset_sec: 45
    source_type: sentinel_edr
    template: dns_query
    host: "{{ actors.attacker.initial_host }}"
    fields:
      query_name: "server-db-01.corp.local"
      user: "{{ actors.attacker.initial_user }}"
      severity: Low

  # Phase 2: Credential Dumping
  - time_offset_sec: 120
    source_type: sentinel_edr
    template: process_creation
    host: "{{ actors.attacker.initial_host }}"
    fields:
      process_name: mimikatz.exe
      command_line: "mimikatz.exe \"privilege::debug\" \"sekurlsa::logonpasswords\" exit"
      parent_process: cmd.exe
      user: "{{ actors.attacker.initial_user }}"
      severity: Critical

  - time_offset_sec: 121
    source_type: sentinel_av
    template: scan_result_malicious
    host: "{{ actors.attacker.initial_host }}"
    fields:
      file_path: "C:\\Users\\bwilson\\Downloads\\mimikatz.exe"
      verdict: malicious
      signature_name: "HackTool:Win64/Mimikatz.A"
      user: "{{ actors.attacker.initial_user }}"

  - time_offset_sec: 122
    source_type: sentinel_edr
    template: lsass_access
    host: "{{ actors.attacker.initial_host }}"
    fields:
      source_process: mimikatz.exe
      target_process: lsass.exe
      desired_access: "0x1010"
      user: "{{ actors.attacker.initial_user }}"
      severity: Critical

  - time_offset_sec: 123
    source_type: winevt_xml
    template: logon_success
    host: "{{ actors.attacker.initial_host }}"
    fields:
      logon_type: 2
      user: "{{ actors.attacker.initial_user }}"
      event_id: 4624

  # Phase 3: Lateral Movement to DB Server
  - time_offset_sec: 300
    source_type: sentinel_ndr
    template: ndr_session
    fields:
      src_ip: "{{ host_ip(actors.attacker.initial_host) }}"
      dst_ip: "{{ host_ip(actors.target_host) }}"
      src_port: 49721
      dst_port: 445
      protocol: tcp
      bytes_in: 15234
      bytes_out: 8921

  - time_offset_sec: 301
    source_type: sentinel_ndr
    template: ndr_smb
    fields:
      src_ip: "{{ host_ip(actors.attacker.initial_host) }}"
      dst_ip: "{{ host_ip(actors.target_host) }}"
      action: tree_connect
      share_name: "\\\\SERVER-DB-01\\C$"

  - time_offset_sec: 310
    source_type: winevt_xml
    template: logon_success
    host: "{{ actors.target_host }}"
    fields:
      logon_type: 3
      user: admin
      source_ip: "{{ host_ip(actors.attacker.initial_host) }}"
      event_id: 4624

  # Phase 4: Data Access
  - time_offset_sec: 600
    source_type: sentinel_edr
    template: file_operation
    host: "{{ actors.target_host }}"
    fields:
      operation: Read
      file_path: "D:\\Databases\\customers_pii.mdf"
      user: admin
      severity: Medium

  - time_offset_sec: 620
    source_type: sentinel_dlp
    template: policy_violation
    host: "{{ actors.target_host }}"
    fields:
      file_path: "D:\\Databases\\customers_pii.mdf"
      policy_name: "PII Data Protection"
      policy_action: alert
      classification: confidential
      channel: share
      user: admin

  - time_offset_sec: 650
    source_type: sentinel_dlp
    template: classification
    host: "{{ actors.target_host }}"
    fields:
      file_path: "D:\\Databases\\financial_records.xlsx"
      classification: restricted
      user: admin

  - time_offset_sec: 700
    source_type: sentinel_edr
    template: network_connection
    host: "{{ actors.target_host }}"
    fields:
      remote_ip: "{{ host_ip(actors.attacker.initial_host) }}"
      remote_port: 49800
      local_port: 445
      direction: Outbound
      protocol: 6
      user: admin
      severity: Medium
