name: ndr_sensor
description: "Normal NDR sensor traffic observations"
events_per_minute: 20
event_templates:
  - weight: 30
    source_type: sentinel_ndr
    template: ndr_session
    fields:
      src_ip: "{{ random_choice(['192.168.1.10', '192.168.1.11', '192.168.1.12']) }}"
      dst_ip: "{{ random_choice(['151.101.1.140', '142.250.80.46', '13.107.42.14', '10.0.0.1', '10.0.0.10']) }}"
      src_port: "{{ random_port() }}"
      dst_port: "{{ random_choice([443, 80, 53, 445, 389]) }}"
      protocol: tcp
      bytes_in: "{{ random_int(100, 50000) }}"
      bytes_out: "{{ random_int(100, 50000) }}"

  - weight: 25
    source_type: sentinel_ndr
    template: ndr_dns
    fields:
      query_name: "{{ random_choice(['www.google.com', 'outlook.office365.com', 'teams.microsoft.com', 'update.microsoft.com', 'cdn.jsdelivr.net']) }}"
      query_type: A
      response_code: NOERROR
      src_ip: "{{ random_choice(['192.168.1.10', '192.168.1.11', '192.168.1.12']) }}"

  - weight: 20
    source_type: sentinel_ndr
    template: ndr_tls
    fields:
      server_name: "{{ random_choice(['www.google.com', 'outlook.office365.com', 'teams.microsoft.com', 'github.com']) }}"
      ja3_hash: "{{ random_hex(32) }}"
      version: "TLSv1.3"
      src_ip: "{{ random_choice(['192.168.1.10', '192.168.1.11', '192.168.1.12']) }}"

  - weight: 15
    source_type: sentinel_ndr
    template: ndr_http
    fields:
      method: "{{ random_choice(['GET', 'POST', 'GET', 'GET']) }}"
      uri: "{{ random_choice(['/', '/api/v1/status', '/static/app.js', '/health']) }}"
      status_code: "{{ random_choice([200, 200, 200, 304, 302]) }}"
      src_ip: "{{ random_choice(['192.168.1.10', '192.168.1.11', '192.168.1.12']) }}"
      host: "{{ random_choice(['www.google.com', 'outlook.office365.com']) }}"

  - weight: 10
    source_type: sentinel_ndr
    template: ndr_smb
    fields:
      action: "{{ random_choice(['tree_connect', 'read', 'write', 'close']) }}"
      share_name: "{{ random_choice(['\\\\\\\\SERVER-DC-01\\\\SYSVOL', '\\\\\\\\SERVER-DC-01\\\\NETLOGON', '\\\\\\\\SERVER-DB-01\\\\backup$']) }}"
      src_ip: "{{ random_choice(['192.168.1.10', '192.168.1.11', '192.168.1.12', '10.0.0.10']) }}"
      dst_ip: "{{ random_choice(['10.0.0.1', '10.0.0.10']) }}"
